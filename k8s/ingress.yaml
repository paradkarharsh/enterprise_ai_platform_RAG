apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusai-ingress
  namespace: nexusai
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexusai.example.com
      secretName: nexusai-tls
  rules:
    - host: nexusai.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nexusai-backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexusai-frontend-service
                port:
                  number: 3000
