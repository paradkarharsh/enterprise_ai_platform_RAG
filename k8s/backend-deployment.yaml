apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusai-backend
  namespace: nexusai
  labels:
    app: nexusai-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexusai-backend
  template:
    metadata:
      labels:
        app: nexusai-backend
    spec:
      containers:
        - name: backend
          image: nexusai/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nexusai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nexusai-backend-service
  namespace: nexusai
spec:
  selector:
    app: nexusai-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
