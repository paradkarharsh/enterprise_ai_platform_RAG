apiVersion: apps/v1
kind: Deployment
metadata:
  name: manthanai-frontend
  namespace: manthanai
  labels:
    app: manthanai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: manthanai-frontend
  template:
    metadata:
      labels:
        app: manthanai-frontend
    spec:
      containers:
        - name: frontend
          image: manthanai/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://manthanai-backend-service:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: manthanai-frontend-service
  namespace: manthanai
spec:
  selector:
    app: manthanai-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
